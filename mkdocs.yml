site_name: ArchLatam
site_url: https://archlatam.github.io/
site_description: Arch Linux LATAM Community
site_author: ArchLatam Team

repo_name: archlatam/archlatam.github.io
repo_url: https://github.com/archlatam/archlatam.github.io

theme:
  name: material
  language: es

  font:
    text: Inter
    code: Fira Code

  features:
    - navigation.tabs
    - navigation.instant
    - navigation.tracking
    - search.highlight
    - search.share

  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro

    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro

extra_css:
  - stylesheets/colors.css
  - stylesheets/fonts.css
  - stylesheets/extra.css

extra_javascript:
  - javascript/extra.js

extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/4r8AmxSB2B
    - icon: fontawesome/brands/github
      link: https://github.com/archlatam

  assets:
    - stylesheets/fonts.css
    - stylesheets/colors.css
    - stylesheets/extra.css
    - javascript/extra.js
    - assets/architalia-fonts/

  consent:
    title: Política de Cookies
    description: >-
      Utilizamos cookies para reconocer tus visitas repetidas y tus preferencias,
      así como para medir la eficacia de nuestra documentación y verificar si los
      usuarios encuentran lo que están buscando. Con tu consentimiento, nos ayudas
      a mejorar nuestra documentación.

  version:
    default: stable

nav:
  - Home: index.md

  - 'Arch Linux':
      - 'What is Arch Linux?': Archlinux-Guida/about-arch.md
      - 'Download': Download/archlinux.md
      - 'Derivatives': Download/Derivate.md
      - '- Arch Linux Installation': en/Archlinux-Guide/guide.md
      - '- Instalación de Arch Linux': en/Archlinux-Guide/guida-es.md

  - 'Other Guides':
      - 'Comandi Linux': Altre-Guide/comandi-linux.md
      - 'Pacman': Altre-Guide/Pacman.md
      - 'AUR': Altre-Guide/aur.md
      - 'Yay': Altre-Guide/yay.md
      - 'Fstab': Altre-Guide/fstab.md
      - 'Vim': Altre-Guide/vim.md
      - 'Nano': Altre-Guide/nano.md
      - 'Sudoers.d': Altre-Guide/sudoers.md
      - 'Reflector': Altre-Guide/reflector.md
      - 'Downgrade': Altre-Guide/downgrade.md
      - 'Permessi': Altre-Guide/permessi.md
      - 'Grub': Altre-Guide/grub.md
      - 'Systemd-Boot': Altre-Guide/systemdboot.md
      - 'Firewalld': Altre-Guide/firewald.md
      - 'Rsync': Altre-Guide/rsync.md
      - 'Timeshift': Altre-Guide/timeshift.md
      - 'User Management': Altre-Guide/gestione-utenti.md
      - 'NordVPN': Altre-Guide/nordvpn.md

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      type: date

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences
  - codehilite
  - toc:
      permalink: true
