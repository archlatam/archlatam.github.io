site_name: ArchLatam
site_description: Comunidad Latinoamericana de Arch Linux y Software Libre
site_url: https://archlatam.github.io/
site_author: ArchLatam Community

repo_url: https://github.com/archlatam
repo_name: archlatam

copyright: Copyright &copy; 2024 ArchLatam

theme:
  name: material
  language: es
  palette:
    primary: cyan
    accent: cyan
  features:
    - navigation.top
    - navigation.tracking
    - navigation.tabs

nav:
  - Home: index.md
  - Arch Linux:
    - ¿Qué es Arch Linux?: Archlinux-Guida/about-arch.md
    - Descarga: Download/archlinux.md
    - Derivadas: Download/derivate.md
  - Guías:
    - Comandos Linux: Altre-Guide/comandi-linux.md
    - Sistema de Archivos: Altre-Guide/filesystem.md
    - Pacman: Altre-Guide/pacman.md
    - AUR: Altre-Guide/aur.md
  - English Guides:
    - Arch Linux Installation: en/Archlinux-Guide/guide.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/archlatam
    - icon: fontawesome/brands/discord
      link: https://discord.gg/4r8AmxSB2B
